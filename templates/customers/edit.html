<div class="min-h-screen bg-gray-50">
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <span class="text-xl font-bold text-indigo-600">Doc-Manager</span>
                    <a href="/" class="text-gray-500 hover:text-gray-900">Dashboard</a>
                    <a href="/forms" class="text-gray-500 hover:text-gray-900">Forms</a>
                    <a href="/customers" class="text-gray-900 font-medium">Customers</a>
                    <a href="/settings/fields" class="text-gray-500 hover:text-gray-900">Settings</a>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-600">{{.UserEmail}}</span>
                    <form method="POST" action="/logout" class="inline">
                        <button type="submit" class="text-sm text-gray-500 hover:text-gray-900">Sign Out</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6">
            <a href="/customers" class="text-indigo-600 hover:text-indigo-700 text-sm font-medium">&larr; Back to Customers</a>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 max-w-2xl">
            <h1 class="text-2xl font-bold text-gray-900 mb-6">
                {{if .IsNew}}Add Customer{{else}}Edit Customer{{end}}
            </h1>

            <form method="POST" action="/customers" class="space-y-4">
                {{if .Customer}}
                <input type="hidden" name="id" value="{{.Customer.ID}}">
                {{end}}

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" name="name" value="{{if .Customer}}{{.Customer.Name}}{{end}}"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Business</label>
                    <input type="text" name="business" value="{{if .Customer}}{{.Customer.Business}}{{end}}"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
                    <input type="text" name="address" value="{{if .Customer}}{{.Customer.Address}}{{end}}"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none">
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
                        <input type="text" name="city" value="{{if .Customer}}{{.Customer.City}}{{end}}"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">State</label>
                        <input type="text" name="state" value="{{if .Customer}}{{.Customer.State}}{{end}}"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Zip</label>
                        <input type="text" name="zip" value="{{if .Customer}}{{.Customer.Zip}}{{end}}"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                    <input type="text" name="phone" value="{{if .Customer}}{{.Customer.Phone}}{{end}}"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none">
                </div>

                <div class="pt-4">
                    <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 font-medium transition-colors">
                        {{if .IsNew}}Add Customer{{else}}Save Changes{{end}}
                    </button>
                    <a href="/customers" class="ml-4 text-gray-500 hover:text-gray-700">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>
