<div class="min-h-screen bg-gray-50">
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <span class="text-xl font-bold text-indigo-600">Doc-Manager</span>
                    <a href="/" class="text-gray-500 hover:text-gray-900">Dashboard</a>
                    <a href="/forms" class="text-gray-900 font-medium">Forms</a>
                    <a href="/customers" class="text-gray-500 hover:text-gray-900">Customers</a>
                    <a href="/settings/fields" class="text-gray-500 hover:text-gray-900">Settings</a>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-600">{{.UserEmail}}</span>
                    <form method="POST" action="/logout" class="inline">
                        <button type="submit" class="text-sm text-gray-500 hover:text-gray-900">Sign Out</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Form Library</h1>
            <button id="uploadBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 font-medium transition-colors">
                Upload Form
            </button>
        </div>

        <input type="file" id="fileInput" accept=".pdf" class="hidden">

        {{if .Forms}}
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {{range .Forms}}
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 hover:shadow-md transition-shadow" data-form-id="{{.ID}}">
                <div class="flex justify-between items-start mb-3">
                    <h3 class="text-lg font-semibold text-gray-900 truncate">{{.Name}}</h3>
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium
                        {{if eq .Status "uploaded"}}bg-green-100 text-green-800
                        {{else if eq .Status "uploading"}}bg-yellow-100 text-yellow-800
                        {{else if eq .Status "analyzing"}}bg-blue-100 text-blue-800
                        {{else if eq .Status "analyzed"}}bg-indigo-100 text-indigo-800
                        {{else}}bg-red-100 text-red-800{{end}}">
                        {{.Status}}
                    </span>
                </div>
                <p class="text-sm text-gray-500 mb-4">Created: {{.CreatedAt}}</p>
                <div class="flex space-x-3">
                    <a href="/forms/{{.ID}}" class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">View</a>
                    <button onclick="deleteForm('{{.ID}}')" class="text-sm text-red-600 hover:text-red-700 font-medium">Delete</button>
                </div>
            </div>
            {{end}}
        </div>
        {{else}}
        <div class="text-center py-16">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <h3 class="mt-4 text-lg font-medium text-gray-900">No forms yet</h3>
            <p class="mt-2 text-gray-500">Upload a PDF form to get started.</p>
        </div>
        {{end}}
    </main>
</div>

<script>
document.getElementById('uploadBtn').addEventListener('click', function() {
    document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    try {
        const resp = await fetch('/api/forms/upload-url', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: file.name, contentType: file.type || 'application/pdf' })
        });
        const data = await resp.json();

        await fetch(data.uploadUrl, {
            method: 'PUT',
            headers: { 'Content-Type': file.type || 'application/pdf' },
            body: file
        });

        await fetch('/api/forms/' + data.formId + '/upload-complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ s3Key: data.s3Key })
        });

        window.location.reload();
    } catch (err) {
        alert('Upload failed: ' + err.message);
    }
});

async function deleteForm(id) {
    if (!confirm('Are you sure you want to delete this form?')) return;
    try {
        await fetch('/api/forms/' + id, { method: 'DELETE' });
        window.location.reload();
    } catch (err) {
        alert('Delete failed: ' + err.message);
    }
}
</script>
